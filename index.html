<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaytoLearn 备考管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: bold; }
    .logo-icon { width: 32px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #667eea; font-weight: bold; }
    .main-container { display: flex; height: calc(100vh - 60px); }
    .sidebar { width: 220px; background: white; border-right: 1px solid #e8e8e8; overflow-y: auto; }
    .nav-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #666; transition: all 0.3s; border-left: 3px solid transparent; }
    .nav-item:hover { background: #f5f7fa; color: #667eea; }
    .nav-item.active { background: #f0f2ff; color: #667eea; border-left-color: #667eea; font-weight: 500; }
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-label { color: #999; font-size: 14px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: bold; color: #333; }
    .stat-value.primary { color: #667eea; }
    .stat-value.warning { color: #fa8c16; }
    .stat-value.success { color: #52c41a; }
    .countdown-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .countdown-timer { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
    .countdown-item { background: rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 8px; min-width: 80px; }
    .countdown-number { font-size: 32px; font-weight: bold; display: block; }
    .countdown-label { font-size: 12px; opacity: 0.8; }
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .action-card { background: white; padding: 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; text-align: center; }
    .action-card:hover { border-color: #667eea; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.15); }
    .action-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; }
    .action-name { font-size: 14px; color: #333; font-weight: 500; }
    .data-table-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
    .table-toolbar { padding: 16px 20px; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
    .table-filters { display: flex; gap: 10px; }
    .filter-btn { padding: 8px 16px; border: 1px solid #d9d9d9; background: white; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .filter-btn:hover { border-color: #667eea; color: #667eea; }
    .search-box { display: flex; align-items: center; border: 1px solid #d9d9d9; border-radius: 6px; padding: 6px 12px; background: white; }
    .search-box input { border: none; outline: none; font-size: 14px; width: 200px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #fafafa; padding: 12px 16px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #e8e8e8; font-size: 14px; }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #666; }
    .data-table tr:hover { background: #f5f7fa; }
    .status-tag { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .status-pending { background: #fff7e6; color: #fa8c16; }
    .status-progress { background: #e6f7ff; color: #1890ff; }
    .status-completed { background: #f6ffed; color: #52c41a; }
    .action-btn { padding: 4px 12px; border: none; background: #667eea; color: white; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 8px; }
    .action-btn.secondary { background: #f0f0f0; color: #666; }
    .pagination { padding: 16px 20px; border-top: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
    .page-info { color: #999; font-size: 14px; }
    .page-controls { display: flex; gap: 8px; align-items: center; }
    .page-btn { padding: 6px 12px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .placeholder-page { text-align: center; padding: 100px 20px; color: #999; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">W</div>
        <span>WaytoLearn 备考管理系统</span>
      </div>
      <div class="user-info" id="userName">择风</div>
    </header>
    <div class="main-container">
      <aside class="sidebar" id="sidebar">
        <!-- 导航由 JS 生成 -->
      </aside>
      <main class="content">
        <div id="homePage">
          <div class="page-header"><h1>📋 首页 - 学习任务管理</h1></div>
          <div class="stats-row">
            <div class="stat-card"><div class="stat-label">总学习时长</div><div class="stat-value primary"><span id="totalDuration">328</span><span style="font-size:16px">分钟</span></div></div>
            <div class="stat-card"><div class="stat-label">今日学习</div><div class="stat-value"><span id="todayDuration">96</span><span style="font-size:16px">分钟</span></div></div>
            <div class="stat-card"><div class="stat-label">待完成任务</div><div class="stat-value warning" id="pendingTasks">42</div></div>
            <div class="stat-card"><div class="stat-label">距离考试</div><div class="stat-value success"><span id="countdownDays">26</span><span style="font-size:16px">天</span></div></div>
          </div>
          <div class="countdown-card">
            <div class="countdown-title">⏰ 距离安徽省考 2026/03/14 09:00 还有</div>
            <div class="countdown-timer">
              <div class="countdown-item"><span class="countdown-number" id="cdDays">26</span><span class="countdown-label">天</span></div>
              <div class="countdown-item"><span class="countdown-number" id="cdHours">14</span><span class="countdown-label">时</span></div>
              <div class="countdown-item"><span class="countdown-number" id="cdMinutes">32</span><span class="countdown-label">分</span></div>
              <div class="countdown-item"><span class="countdown-number" id="cdSeconds">45</span><span class="countdown-label">秒</span></div>
            </div>
          </div>
          <div class="quick-actions">
            <div class="action-card"><div class="action-icon">📝</div><div class="action-name">单个任务录入</div></div>
            <div class="action-card"><div class="action-icon">📅</div><div class="action-name">上传考试信息</div></div>
            <div class="action-card"><div class="action-icon">❌</div><div class="action-name">行测错题上传</div></div>
            <div class="action-card"><div class="action-icon">📤</div><div class="action-name">批量添加任务</div></div>
          </div>
          <div class="data-table-container">
            <div class="table-toolbar">
              <div class="table-filters">
                <button class="filter-btn">🔍 筛选</button>
                <button class="filter-btn">📊 分组</button>
                <button class="filter-btn">🔃 排序</button>
              </div>
              <div class="search-box"><input id="searchInput" placeholder="搜索任务..."><span>🔍</span></div>
            </div>
            <table class="data-table">
              <thead><tr><th>任务名</th><th>任务类型</th><th>预计完成时间</th><th>开始时间</th><th>学习时长 (分钟)</th><th>状态</th><th>学习人</th><th>操作</th></tr></thead>
              <tbody id="taskTableBody">
                <!-- 任务由 JS 生成 -->
              </tbody>
            </table>
            <div class="pagination"><div class="page-info">共 <span id="taskCount">8</span> 条</div><div class="page-controls"><button class="page-btn" disabled>上一页</button><button class="page-btn active">1</button><button class="page-btn">下一页</button></div></div>
          </div>
        </div>
        <div id="otherPage" class="placeholder-page" style="display:none;"><h1 id="otherPageTitle">考试情况</h1><p>页面开发中...</p></div>
      </main>
    </div>
  </div>
  <script>
    // 导航菜单
    const navItems = [
      { key: 'home', title: '首页', icon: '🏠' },
      { key: 'exam', title: '考试情况', icon: '📅' },
      { key: 'practice', title: '刷题记录', icon: '📝' },
      { key: 'xingce', title: '行测职测', icon: '📚' },
      { key: 'shenlun', title: '申论综应', icon: '✍️' },
      { key: 'community', title: '社区', icon: '💬' },
      { key: 'plan', title: '计划和课程', icon: '📋' },
      { key: 'profile', title: '我的', icon: '⚙️' }
    ];

    // 任务数据
    const tasks = [
      { id: 1, task_name: '逻辑：花生逻辑 600 题 1 套', task_type: '逻辑推理', expected_finish_time: '2026/02/23', start_time: '2026/02/23 10:00', duration_minutes: 17, status: '未开始', learner: '择风' },
      { id: 2, task_name: '言语：花生 600 题 1 套', task_type: '言语理解', expected_finish_time: '2026/02/23', start_time: '2026/02/23 14:00', duration_minutes: 96, status: '未开始', learner: '择风' },
      { id: 3, task_name: '资料：刷题男孩毛娃儿刷题课 19、20', task_type: '资料分析', expected_finish_time: '2026/02/23', start_time: '2026/02/23 16:00', duration_minutes: 66, status: '未开始', learner: '择风' },
      { id: 4, task_name: '言语：花生 600 题 1 套', task_type: '言语理解', expected_finish_time: '2026/02/21', start_time: '2026/02/21 09:00', duration_minutes: 54, status: '进行中', learner: '罗佳' },
      { id: 5, task_name: '资料：刷题男孩毛娃儿刷题课 17、18', task_type: '资料分析', expected_finish_time: '2026/02/21', start_time: '2026/02/21 14:00', duration_minutes: 58, status: '已完成', learner: '罗佳' },
      { id: 6, task_name: '小马哥申论 16（大作文 2）', task_type: '申论', expected_finish_time: '2026/02/20', start_time: '2026/02/20 10:00', duration_minutes: 120, status: '已完成', learner: '择风' },
      { id: 7, task_name: '言语：郭熙 100 题第 10 节', task_type: '言语理解', expected_finish_time: '2026/02/17', start_time: '2026/02/17 09:00', duration_minutes: 45, status: '已完成', learner: '罗佳' },
      { id: 8, task_name: '资料：刷题男孩毛娃儿刷题课 9、10', task_type: '资料分析', expected_finish_time: '2026/02/17', start_time: '2026/02/17 14:00', duration_minutes: 63, status: '已完成', learner: '择风' }
    ];

    let currentPage = 'home';

    // 渲染导航
    function renderNav() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = navItems.map(item => 
        `<div class="nav-item ${item.key === currentPage ? 'active' : ''}" onclick="switchPage('${item.key}')">
          <span>${item.icon}</span>
          <span>${item.title}</span>
        </div>`
      ).join('');
    }

    // 切换页面
    function switchPage(page) {
      currentPage = page;
      renderNav();
      if (page === 'home') {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('otherPage').style.display = 'none';
      } else {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('otherPage').style.display = 'block';
        document.getElementById('otherPageTitle').textContent = navItems.find(i => i.key === page).title;
      }
    }

    // 获取状态样式
    function getStatusClass(status) {
      if (status === '未开始') return 'pending';
      if (status === '进行中') return 'progress';
      if (status === '已完成') return 'completed';
      return 'pending';
    }

    // 获取操作文本
    function getActionText(status) {
      if (status === '未开始') return '开始计时';
      if (status === '进行中') return '继续';
      return '查看';
    }

    // 渲染任务表格
    function renderTasks() {
      const tbody = document.getElementById('taskTableBody');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = tasks.filter(t => t.task_name.toLowerCase().includes(search));
      
      tbody.innerHTML = filtered.map(task => 
        `<tr>
          <td>${task.task_name}</td>
          <td>${task.task_type}</td>
          <td>${task.expected_finish_time}</td>
          <td>${task.start_time}</td>
          <td>${task.duration_minutes}</td>
          <td><span class="status-tag status-${getStatusClass(task.status)}">${task.status}</span></td>
          <td>${task.learner}</td>
          <td><button class="action-btn">${getActionText(task.status)}</button><button class="action-btn secondary">编辑</button></td>
        </tr>`
      ).join('');
      
      document.getElementById('taskCount').textContent = filtered.length;
    }

    // 倒计时
    function startCountdown() {
      const target = new Date('2026-03-14T09:00:00');
      setInterval(() => {
        const now = new Date();
        const diff = target - now;
        if (diff > 0) {
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          document.getElementById('cdDays').textContent = days;
          document.getElementById('cdHours').textContent = hours;
          document.getElementById('cdMinutes').textContent = minutes;
          document.getElementById('cdSeconds').textContent = seconds;
          document.getElementById('countdownDays').textContent = days;
        }
      }, 1000);
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      renderNav();
      renderTasks();
      startCountdown();
      document.getElementById('searchInput').addEventListener('input', renderTasks);
    });
  </script>
</body>
</html>
